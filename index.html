<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Architecture Decision Records</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1rem;
    }
    header {
      text-align: center;
      margin-bottom: 3rem;
    }
    header h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
    }
    header p {
      color: #666;
      font-size: 1rem;
    }
    .container {
      width: 100%;
      max-width: 640px;
    }
    .team {
      margin-bottom: 2rem;
    }
    .team h2 {
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #666;
      margin-bottom: 0.5rem;
      padding-bottom: 0.25rem;
      border-bottom: 1px solid #ddd;
    }
    .project {
      display: block;
      padding: 0.75rem 1rem;
      margin-bottom: 0.5rem;
      background: #fff;
      border-radius: 6px;
      text-decoration: none;
      color: #1a73e8;
      font-weight: 500;
      transition: box-shadow 0.15s;
    }
    .project:hover {
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .empty {
      color: #999;
      text-align: center;
      padding: 2rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>Architecture Decision Records</h1>
  </header>
  <div class="container">
        <div class="team">
          <h2>partnerships</h2>
            <a href="partnerships/partner-portal-service/" class="project">partner-portal-service</a>
        </div>
  </div>
</body>
</html>
