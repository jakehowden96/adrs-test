name: Deploy ADR Content

on:
  workflow_call:
    inputs:
      team_name:
        required: true
        type: string
      project_name:
        required: true
        type: string
    secrets:
      deploy_key:
        required: true

env:
  HOST_REPO: git@github.com:jakehowden96/adrs-test.git

jobs:
  push-content:
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-adrs
      cancel-in-progress: false
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4

      - name: Setup SSH for deploy key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.deploy_key }}

      - name: Push ADR markdown to host repo
        env:
          TEAM_NAME: ${{ inputs.team_name }}
          PROJECT_NAME: ${{ inputs.project_name }}
        run: |
          set -euo pipefail

          TARGET_DIR="docs/${TEAM_NAME}/${PROJECT_NAME}"

          git clone --depth 1 "$HOST_REPO" adrs-host
          cd adrs-host

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          mkdir -p "$TARGET_DIR"
          rm -rf "${TARGET_DIR:?}"/*

          cp -r ../docs/adr/* "$TARGET_DIR/"

          if [ ! -f "$TARGET_DIR/index.md" ]; then
            cat > "$TARGET_DIR/index.md" << EOF
          ---
          title: ${PROJECT_NAME}
          description: Architecture Decision Records for ${PROJECT_NAME}.
          ---

          # ${PROJECT_NAME}

          {{ project_adr_table() }}
          EOF
          fi

          git add -A
          if git diff --cached --quiet; then
            echo "No changes to deploy"
            exit 0
          fi

          git commit -m "docs: update ADR content for ${PROJECT_NAME}"

          MAX_RETRIES=3
          for i in $(seq 1 $MAX_RETRIES); do
            if git push; then
              echo "Push succeeded on attempt $i"
              exit 0
            fi
            echo "Push failed on attempt $i, rebasing and retrying..."
            sleep $((RANDOM % 10 + 5))
            git pull --rebase
          done

          echo "Push failed after $MAX_RETRIES attempts"
          exit 1
